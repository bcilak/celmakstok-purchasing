{% extends "base.html" %}

{% block title %}Profil{% endblock %}

{% block content %}
<h2><i class="bi bi-person-circle"></i> Profil Bilgileri</h2>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Kullanıcı Bilgileri</h5>
                <hr>
                <div class="mb-3">
                    <label class="text-muted">Ad Soyad</label>
                    <p class="fw-bold">{{ current_user.name }}</p>
                </div>
                <div class="mb-3">
                    <label class="text-muted">Kullanıcı Adı</label>
                    <p class="fw-bold">{{ current_user.username }}</p>
                </div>
                <div class="mb-3">
                    <label class="text-muted">E-posta</label>
                    <p class="fw-bold">{{ current_user.email or 'Belirtilmemiş' }}</p>
                </div>
                <div class="mb-3">
                    <label class="text-muted">Rol</label>
                    <p><span class="badge bg-primary">{{ current_user.role }}</span></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
