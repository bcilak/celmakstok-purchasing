<!-- Fiyat Ekleme/Düzenleme Modal -->
<div class="modal fade" id="addPriceModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="POST" action="{{ url_for('suppliers.manage_prices', id=supplier.id) }}">
                <div class="modal-header">
                    <h5 class="modal-title">Fiyat Ekle/Düzenle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="price_id" id="price_id">

                    <div class="mb-3">
                        <label class="form-label">Ürün Kodu *</label>
                        <input type="text" class="form-control" name="product_code" id="product_code" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Birim Fiyat *</label>
                            <input type="number" step="0.01" class="form-control" name="unit_price" id="unit_price"
                                required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Para Birimi *</label>
                            <select class="form-select" name="currency" id="currency">
                                <option value="TRY">TRY</option>
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Min. Sipariş Miktarı</label>
                            <input type="number" class="form-control" name="minimum_order_quantity"
                                id="minimum_order_quantity">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Teslimat Süresi (gün)</label>
                            <input type="number" class="form-control" name="lead_time_days" id="lead_time_days">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Geçerlilik Başlangıcı</label>
                            <input type="date" class="form-control" name="valid_from" id="valid_from">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Geçerlilik Bitişi</label>
                            <input type="date" class="form-control" name="valid_until" id="valid_until">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">İptal</button>
                    <button type="submit" class="btn btn-primary">Kaydet</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function editPrice(id, productCode, unitPrice, currency, minOrder, leadTime) {
        document.getElementById('price_id').value = id;
        document.getElementById('product_code').value = productCode;
        document.getElementById('unit_price').value = unitPrice;
        document.getElementById('currency').value = currency;
        document.getElementById('minimum_order_quantity').value = minOrder || '';
        document.getElementById('lead_time_days').value = leadTime || '';

        var modal = new bootstrap.Modal(document.getElementById('addPriceModal'));
        modal.show();
    }
</script>
